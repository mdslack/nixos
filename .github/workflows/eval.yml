name: flake-ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: nixfmt check
        run: |
          mapfile -t nix_files < <(git ls-files '*.nix')
          nix run nixpkgs#nixfmt -- --check "${nix_files[@]}"

      - name: statix check
        run: nix run nixpkgs#statix -- check .

      - name: deadnix check
        run: nix run nixpkgs#deadnix -- --fail .

  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Flake show
        run: nix flake show --no-write-lock-file

      - name: Eval representative outputs
        run: |
          nix eval --no-write-lock-file --json .#nixosConfigurations --apply builtins.attrNames

  critical-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - framework13-niri-bootstrap
          - meerkat-niri-noctalia
          - elitedesk-hyprland-dms
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Build critical target
        run: nix build --no-link --no-write-lock-file .#nixosConfigurations.${{ matrix.target }}.config.system.build.toplevel
