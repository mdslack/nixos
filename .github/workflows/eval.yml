name: flake-ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v6

      - name: nixfmt check
        run: |
          mapfile -t nix_files < <(git ls-files "modules/**/*.nix")
          nix run nixpkgs#nixfmt -- --check flake.nix home/mslack.nix "${nix_files[@]}"

      - name: statix check
        run: nix run nixpkgs#statix -- check .

      - name: deadnix check
        run: nix run nixpkgs#deadnix -- --fail modules flake.nix home/mslack.nix

  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v6

      - name: Flake show
        run: nix flake show --no-write-lock-file

      - name: Eval representative outputs
        run: |
          nix eval --no-write-lock-file --json .#nixosConfigurations --apply builtins.attrNames

  critical-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - meerkat-minimal
          - meerkat-niri
          - meerkat-hyprland
          - meerkat-niri-noctalia
          - meerkat-hyprland-dms
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Restore Nix store cache
        uses: nix-community/cache-nix-action@v6

      - name: Build critical target
        run: nix build --no-link --no-write-lock-file .#nixosConfigurations.${{ matrix.target }}.config.system.build.toplevel
